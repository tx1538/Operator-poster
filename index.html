<html lang="zh-CN">

  <meta charset="utf-8">

  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f8;
      --panel: #ffffff;
      --line: #dce5f2;
      --text: #19233c;
      --muted: #66728a;
      --theme: #3169d8;
      --theme-dark: #2549bd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .app {
      width: min(1240px, 100%);
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: minmax(320px, 800px) minmax(280px, 360px);
      gap: 20px;
      align-items: start;
    }

    .preview-shell,
    .editor {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 14px 36px rgba(42, 67, 111, 0.12);
    }

    .preview-shell {
      padding: 16px;
    }

    .canvas-wrap {
      width: 100%;
      overflow: auto;
      border-radius: 6px;
      background: #d8e4f8;
      max-height: calc(100vh - 48px);
    }

    canvas {
      display: block;
      width: min(100%, 800px);
      height: auto;
      margin: 0 auto;
      background: var(--theme);
    }

    .editor {
      padding: 18px;
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 32px);
      overflow: auto;
    }

    .editor h1 {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.3;
      font-weight: 800;
    }

    .mode-tabs,
    .template-tabs {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .mode-tabs {
      grid-template-columns: 1fr 1fr;
    }

    .template-tabs {
      grid-template-columns: repeat(4, 1fr);
      margin-bottom: 16px;
    }

    .mode-tab,
    .template-tab {
      min-height: 38px;
      padding: 0 8px;
      border: 1px solid #cbd7e7;
      border-radius: 6px;
      color: var(--muted);
      background: #f7faff;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .mode-tab.is-active,
    .template-tab.is-active {
      color: #ffffff;
      border-color: transparent;
      background: linear-gradient(90deg, var(--theme-dark), var(--theme));
    }

    .fields {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid #cbd7e7;
      border-radius: 6px;
      outline: none;
      font: inherit;
      color: var(--text);
      background: #fbfdff;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
      line-height: 1.55;
    }

    input:focus,
    textarea:focus {
      border-color: var(--theme);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--theme) 16%, transparent);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .primary {
      color: #ffffff;
      background: linear-gradient(90deg, var(--theme-dark), var(--theme));
    }

    .secondary {
      color: var(--theme-dark);
      background: color-mix(in srgb, var(--theme) 12%, #ffffff);
    }

    .site-footer {
      width: min(1240px, 100%);
      margin: -4px auto 0;
      padding: 0 24px 24px;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
    }

    .site-footer a {
      color: var(--theme-dark);
      text-decoration: none;
    }

    .site-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .editor {
        position: static;
        max-height: none;
      }

      .canvas-wrap {
        max-height: none;
      }

      .site-footer {
        padding: 0 14px 18px;
      }
    }
  </style>
</head>

    function roundedRect(x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + width - r, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + r);
      ctx.lineTo(x + width, y + height - r);
      ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      ctx.lineTo(x + r, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function gradient(x1, y1, x2, y2, start, end) {
      const grad = ctx.createLinearGradient(x1, y1, x2, y2);
      grad.addColorStop(0, start);
      grad.addColorStop(1, end);
      return grad;
    }

    function fillScaledText(text, x, y, maxWidth, options = {}) {
      const safeText = text || "";
      if (!safeText) {
        return;
      }
      const {
        align = "center",
        baseline = "alphabetic",
        fill = "#ffffff",
        fontValue = font("800", 32),
        shadow = null
      } = options;

      ctx.save();
      ctx.font = fontValue;
      ctx.textAlign = align;
      ctx.textBaseline = baseline;
      ctx.fillStyle = fill;
      if (shadow) {
        ctx.shadowColor = shadow.color;
        ctx.shadowBlur = shadow.blur || 0;
        ctx.shadowOffsetX = shadow.x || 0;
        ctx.shadowOffsetY = shadow.y || 0;
      }
      const measured = Math.max(ctx.measureText(safeText).width, 1);
      const scale = Math.min(1, maxWidth / measured);
      ctx.translate(x, y);
      ctx.scale(scale, 1);
      ctx.fillText(safeText, 0, 0);
      ctx.restore();
    }

    function drawWrappedParagraphs(text, x, y, maxWidth, options) {
      const paragraphs = (text || "").split(/\n+/).filter(Boolean);
      let cursorY = y;
      let linesDrawn = 0;
      for (const paragraph of paragraphs) {
        const wrapped = wrapText(paragraph, maxWidth, options.fontValue);
        for (const line of wrapped) {
          if (options.maxLines && linesDrawn >= options.maxLines) {
            return;
          }
          drawRichLine(line, x, cursorY, maxWidth, options);
          cursorY += options.lineHeight;
          linesDrawn += 1;
        }
        cursorY += options.paragraphGap || 0;
      }
    }

    function drawIndentedParagraphs(text, firstX, nextX, y, firstMaxWidth, nextMaxWidth, options) {
      const paragraphs = (text || "").split(/\n+/).filter(Boolean);
      let cursorY = y;
      let linesDrawn = 0;
      let isFirstLine = true;

      for (const paragraph of paragraphs) {
        let remaining = paragraph;
        while (remaining) {
          if (options.maxLines && linesDrawn >= options.maxLines) {
            return;
          }
          const x = isFirstLine ? firstX : nextX;
          const maxWidth = isFirstLine ? firstMaxWidth : nextMaxWidth;
          const line = takeFittingLine(remaining, maxWidth, options.fontValue);
          drawRichLine(line, x, cursorY, maxWidth, options);
          remaining = remaining.slice(line.length);
          cursorY += options.lineHeight;
          linesDrawn += 1;
          isFirstLine = false;
        }
        cursorY += options.paragraphGap || 0;
      }
    }

    function takeFittingLine(text, maxWidth, fontValue) {
      ctx.save();
      ctx.font = fontValue;
      let line = "";
      for (const char of text) {
        const test = line + char;
        if (line && ctx.measureText(test).width > maxWidth) {
          ctx.restore();
          return line;
        }
        line = test;
      }
      ctx.restore();
      return line;
    }

    function wrapText(text, maxWidth, fontValue) {
      ctx.save();
      ctx.font = fontValue;
      const lines = [];
      let line = "";
      for (const char of text) {
        const test = line + char;
        if (line && ctx.measureText(test).width > maxWidth) {
          lines.push(line);
          line = char;
        } else {
          line = test;
        }
      }
      if (line) {
        lines.push(line);
      }
      ctx.restore();
      return lines;
    }

    function drawRichLine(line, x, y, maxWidth, options) {
      const tokens = splitHighlightTokens(line);
      ctx.save();
      ctx.font = options.fontValue;
      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";
      let cursorX = x;
      tokens.forEach((token) => {
        ctx.fillStyle = token.highlight ? options.highlight : options.fill;
        ctx.fillText(token.text, cursorX, y);
        cursorX += ctx.measureText(token.text).width;
      });
      ctx.restore();
    }

    function splitHighlightTokens(line) {
      const pattern = /(\d+(?:\.\d+)?(?:G|元|分钟|个月|天|号|年|月)|\d+\/\d+元|\d+-\d+个月|优惠\d+元|29元\/月|39元\/月)/g;
      const tokens = [];
      let lastIndex = 0;
      let match;
      while ((match = pattern.exec(line)) !== null) {
        if (match.index > lastIndex) {
          tokens.push({ text: line.slice(lastIndex, match.index), highlight: false });
        }
        tokens.push({ text: match[0], highlight: true });
        lastIndex = match.index + match[0].length;
      }
      if (lastIndex < line.length) {
        tokens.push({ text: line.slice(lastIndex), highlight: false });
      }
      return tokens;
    }

    function colorWithAlpha(hex, alpha) {
      const clean = hex.replace("#", "");
      const value = parseInt(clean.length === 3 ? clean.split("").map((c) => c + c).join("") : clean, 16);
      const r = (value >> 16) & 255;
      const g = (value >> 8) & 255;
      const b = value & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function drawStarLines(text, x, y, maxWidth, tpl) {
      const lines = (text || "").split(/\n+/).filter(Boolean);
      lines.forEach((line, index) => {
        ctx.save();
        ctx.font = font("600", 17, '"Microsoft YaHei", "SimHei", Arial, sans-serif');
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
        ctx.fillStyle = tpl.colors.warning;
        ctx.fillText("★", x, y + index * 31);
        ctx.fillStyle = "#111111";
        const wrapped = wrapText(line, maxWidth - 22, ctx.font);
        if (wrapped[0]) {
          ctx.fillText(wrapped[0], x + 20, y + index * 31);
        }
        ctx.restore();
      });
    }

    function toBlob(targetCanvas, type, quality) {
      return new Promise((resolve) => {
        targetCanvas.toBlob((blob) => {
          if (blob) {
            resolve(blob);
            return;
          }
          try {
            resolve(dataUrlToBlob(targetCanvas.toDataURL(type, quality)));
          } catch (error) {
            console.error(error);
            resolve(null);
          }
        }, type, quality);
      });
    }

    function dataUrlToBlob(dataUrl) {
      const [header, data] = dataUrl.split(",");
      const mime = (header.match(/data:([^;]+)/) || [])[1] || "image/jpeg";
      const binary = atob(data);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return new Blob([bytes], { type: mime });
    }

    async function createCompressedBlob(targetCanvas, maxBytes) {
      const png = await toBlob(targetCanvas, "image/png");
      if (png && png.size <= maxBytes) {
        return png;
      }

      const webp = await createQualityCompressedBlob(targetCanvas, maxBytes, "image/webp");
      if (webp) {
        return webp;
      }

      return createQualityCompressedBlob(targetCanvas, maxBytes, "image/jpeg");
    }

    async function createQualityCompressedBlob(targetCanvas, maxBytes, type) {
      let best = null;
      let low = 0.05;
      let high = 1;
      const maximum = await toBlob(targetCanvas, type, 1);
      if (!maximum) {
        return null;
      }
      if (type === "image/webp" && maximum.type !== "image/webp") {
        return null;
      }
      if (maximum.size <= maxBytes) {
        return maximum;
      }

      for (let i = 0; i < 12; i += 1) {
        const quality = (low + high) / 2;
        const blob = await toBlob(targetCanvas, type, quality);
        if (!blob) {
          return null;
        }
        if (type === "image/webp" && blob.type !== "image/webp") {
          return null;
        }
        if (blob.size <= maxBytes) {
          best = blob;
          low = quality;
        } else {
          high = quality;
        }
      }

      if (best) {
        return best;
      }

      const smallest = await toBlob(targetCanvas, type, 0.05);
      if (type === "image/webp" && smallest && smallest.type !== "image/webp") {
        return null;
      }
      return smallest && smallest.size <= maxBytes ? smallest : createScaledCompressedBlob(targetCanvas, maxBytes);
    }

    async function createScaledCompressedBlob(targetCanvas, maxBytes) {
      const tempCanvas = document.createElement("canvas");
      const tempCtx = tempCanvas.getContext("2d");
      for (let scale = 0.95; scale >= 0.55; scale -= 0.05) {
        tempCanvas.width = Math.round(targetCanvas.width * scale);
        tempCanvas.height = Math.round(targetCanvas.height * scale);
        tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
        tempCtx.drawImage(targetCanvas, 0, 0, tempCanvas.width, tempCanvas.height);
        const blob = await toBlob(tempCanvas, "image/jpeg", 0.7);
        if (blob && blob.size <= maxBytes) {
          return blob;
        }
      }
      return toBlob(tempCanvas, "image/jpeg", 0.35);
    }
  </script>
